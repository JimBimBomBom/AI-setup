# Local LLM stack: Ollama (model server) + Open WebUI (frontend)
#
# Network isolation:
#   - ollama       -> internal Docker network only, NOT reachable from host or LAN
#   - open-webui   -> reachable on the LAN at http://<host-IP>:8081
#
# GPU passthrough requires NVIDIA Container Toolkit on the host.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    # No `ports:` block on purpose — Ollama is reachable only via the
    # internal Docker network. Open WebUI talks to it at http://ollama:11434.
    networks:
      - llm_internal
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_FLASH_ATTENTION=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      - ollama
    networks:
      - llm_internal
    ports:
      # host:container — host port 8081 is published on all interfaces (0.0.0.0),
      # so the UI is reachable from any device on the LAN at http://<host-IP>:8081.
      # To restrict to the host machine only, change to "127.0.0.1:8081:8080".
      - "8081:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=True              # require login (recommended on LAN-exposed deployments)
      # - WEBUI_SECRET_KEY=change_me # optional; auto-generated and persisted in volume if unset
    volumes:
      - open_webui_data:/app/backend/data
    restart: unless-stopped

networks:
  llm_internal:
    driver: bridge

volumes:
  ollama_data:
  open_webui_data:
