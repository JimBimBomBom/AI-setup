# n8n Workflow Automation
# 
# n8n provides visual workflow automation with:
#   - Cron triggers for scheduled tasks
#   - RSS feed reader
#   - HTTP requests / web scraping
#   - Ollama integration for AI processing
#   - Discord, Email, and other notifications
#
# Access n8n at: http://localhost:5678
#
# This compose connects to Ollama running on the host (systemd service)
# using host.docker.internal (Docker Desktop) or host network mode (Linux)
# 
# Workflows are auto-imported on startup from ./n8n/workflows/

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      # Additional env vars not in .env file
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # Allow importing workflows without manual activation
      - N8N_WORKFLOW_AUTO_LOAD=false
      # Enable manual workflow execution
      - N8N_WORKFLOW_CALLER_POLICY=workflowsFromSameOwner
      # Allow Code nodes to use Node.js built-in fs module (for reading /data/jobs/*.json)
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path
    volumes:
      - n8n_data:/home/node/.n8n
      - ./jobs:/data/jobs:ro
      - ./n8n/workflows:/workflows:ro
      - ./n8n/start.sh:/start.sh:ro
    # Use custom startup script to import workflows
    entrypoint: ["/bin/sh", "/start.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  n8n_data:
    driver: local
