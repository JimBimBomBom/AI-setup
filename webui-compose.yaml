# Open WebUI - Public Facing Chat Interface
#
# This deployment runs Open WebUI in Docker and connects to the Ollama
# service running on the host at localhost:11434.
#
# Network Configuration:
#   - Port 8081 is exposed to all interfaces (0.0.0.0)
#   - Accessible from any device on your network
#   - Connects to Ollama via host network (localhost:11434)
#
# Security:
#   - WEBUI_AUTH=True requires login (recommended for LAN exposure)
#   - Ollama itself is NOT exposed - only accessible via Open WebUI

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    # Use host network to reach Ollama at localhost:11434
    network_mode: host
    environment:
      - PORT=8081
      - OLLAMA_BASE_URL=http://localhost:11434
      - WEBUI_AUTH=True
      - OLLAMA_KEEP_ALIVE=1h
    volumes:
      - open_webui_data:/app/backend/data
    restart: unless-stopped
    # Ensure Ollama is ready before starting
    depends_on: []

volumes:
  open_webui_data:
