# Ollama AI Model Server - Local Network Only
# 
# This deployment runs Ollama in Docker with GPU access.
# Ollama is NOT exposed to the public internet - only accessible on the local network.
#
# Network Security:
#   - Port 11434 is bound to localhost (127.0.0.1) only
#   - Other services on the same host can access via localhost:11434
#   - Open WebUI (in separate container) connects via host network
#
# GPU Configuration:
#   - Uses ai-mode.sh to switch between single and dual GPU modes
#   - small mode: GPU 1 only (5060 Ti, 8GB) - for E4B model
#   - big mode: GPU 0,1 (both GPUs, 24GB total) - for 26B model

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    # Bind to localhost only - not accessible from outside the machine
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_FLASH_ATTENTION=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    # Health check to ensure Ollama is ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ollama_data:
